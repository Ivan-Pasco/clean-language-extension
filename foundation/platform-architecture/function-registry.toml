# Clean Language Platform - Shared Function Registry
#
# This file is the authoritative source of truth for all host functions
# exposed to Clean Language WASM modules. It covers Layer 2 (portable
# host-bridge) and Layer 3 (server-only extensions).
#
# Source of truth for Layer 2 signatures: host-bridge/tests/spec_compliance.wat
# Source of truth for Layer 3 signatures: clean-server/src/bridge.rs
#
# ============================================================
# TYPE EXPANSION RULES
# ============================================================
#
#   "string"  -> WASM (i32, i32)   ptr + len pair
#   "integer" -> WASM (i64)        64-bit signed integer
#   "number"  -> WASM (f64)        64-bit float
#   "boolean" -> WASM (i32)        0 = false, 1 = true
#   "i32"     -> WASM (i32)        raw 32-bit int (port, count, handler index)
#   "i64"     -> WASM (i64)        raw 64-bit int
#   "ptr"     -> WASM (i32)        return only: length-prefixed string pointer
#                                  format: [4-byte LE length][UTF-8 data]
#   "void"    -> no return value
#
# ============================================================
# ALIAS CONVENTION
# ============================================================
#
#   canonical name: underscore style (e.g., math_sin)
#   aliases: dot notation or camelCase variants (e.g., math.sin)
#
# ============================================================

[meta]
version = "1.0.0"
generated_from = [
    "host-bridge/tests/spec_compliance.wat",
    "host-bridge/src/wasm_linker/console.rs",
    "host-bridge/src/wasm_linker/math.rs",
    "host-bridge/src/wasm_linker/string_ops.rs",
    "host-bridge/src/wasm_linker/database.rs",
    "host-bridge/src/wasm_linker/file_io.rs",
    "host-bridge/src/wasm_linker/http_client.rs",
    "host-bridge/src/wasm_linker/crypto_funcs.rs",
    "host-bridge/src/wasm_linker/env_time.rs",
    "host-bridge/src/wasm_linker/memory.rs",
    "src/bridge.rs",
]

